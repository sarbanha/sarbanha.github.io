name: Survey API CI - Staging

on:
  push:
    branches:
      - stage    

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: 
      name: staging
      url: https://stage.potentialisation.com
    steps:
      - name: ssh and deploy app
        shell: bash
        env:
          ssh_key: ${{ env.STAGING_SERVER_SSH_KEY }}
        run: |
          env
          echo $ssh_key | base64 -d > ~/STAGING_SERVER_SSH_KEY
          chmod 400 ~/STAGING_SERVER_SSH_KEY
          cat ~/STAGING_SERVER_SSH_KEY
          ls -lah ~/
          ssh -i ~/STAGING_SERVER_SSH_KEY -oStrictHostKeyChecking=no github@34.122.247.158 "touch HI_FROM_GIT"

