name: Survey API CI - Staging

on:
  push:
    branches:
      - stage    

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: ssh and deploy app
        shell: bash
        env:
          TEST_SECRET: ${{ secrets.STAGING_SERVER_SSH_KEY }}
        run: |
          echo ">> $TEST_SECRET" | base64
          B=$TEST_SECRET
          echo $B > ~/FILE.TXT
          cat ~/FILE.TXT
          
