name: Survey API CI - Staging

on:
  push:
    branches:
      - stage    

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: ssh and deploy app
        shell: bash
        env:
          ssh_key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
        run: |
          env
          echo "SSH Key: $ssh_key"
          echo $ssh_key > ~/STAGING_SERVER_SSH_KEY
          chmod 400 ~/STAGING_SERVER_SSH_KEY
          echo "#######################"
          cat ~/STAGING_SERVER_SSH_KEY
          echo "#######################"
          ls -lah ~/
          # ssh -i ~/STAGING_SERVER_SSH_KEY -oStrictHostKeyChecking=no github@34.122.247.158 "touch HI_FROM_GIT"

